<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio CMD - Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        .terminal-body {
            background: #000;
            color: #00ff00;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #terminal-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
            font-size: 16px;
        }

        #input-container {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .prompt {
            color: #00aa00;
            font-weight: bold;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            flex: 1;
            outline: none;
        }

        #cmd-input::placeholder {
            color: #006600;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            0%, 50% { border-color: #00ff00; }
            51%, 100% { border-color: transparent; }
        }

        .typing {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #00ff00;
            animation: blink 0.7s infinite;
        }

        .welcome-text {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .command-line {
            color: #00aa00;
            margin-top: 15px;
        }

        .divider {
            color: #006600;
            margin: 10px 0;
        }

        /* CRT Effect */
        #terminal-container::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.06),
                rgba(0, 0, 0, 0.06) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: -1;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
        }
    </style>
</head>
<body class="terminal-body">
    <div id="terminal-container">
        <div id="output" class="output">
            <div id="welcome-section" class="welcome-text"></div>
        </div>
        <div id="input-container">
            <span id="prompt" class="prompt">portfolio@cmd ~$ </span>
            <input id="cmd-input" type="text" autofocus>
        </div>
    </div>
    <script>
        // Typing animation for welcome message - runs before terminal.js
        const welcomeMessages = [
            "╔════════════════════════════════════════════════════════════╗",
            "║                                                            ║",
            "║              🎉 WELCOME TO EL DORADO 🎉                   ║",
            "║                                                            ║",
            "║          Jaswanth's Professional Portfolio CMD             ║",
            "║                                                            ║",
            "╚════════════════════════════════════════════════════════════╝",
            "",
            "Type 'help' to see available commands...",
            "💡 Use laptop to better view",
            ""
        ];

        window.skipDefaultWelcome = true;

        document.addEventListener('DOMContentLoaded', () => {
            const welcomeSection = document.getElementById('welcome-section');
            const output = document.getElementById('output');
            let currentLineIndex = 0;
            let currentCharIndex = 0;

            function typeWelcome() {
                if (currentLineIndex < welcomeMessages.length) {
                    const line = welcomeMessages[currentLineIndex];
                    
                    if (currentCharIndex <= line.length) {
                        welcomeSection.innerHTML = welcomeMessages.slice(0, currentLineIndex).join('\n') + 
                                                  (currentLineIndex > 0 ? '\n' : '') +
                                                  '<span class="typing">' + line.substring(0, currentCharIndex) + '</span>';
                        output.scrollTop = output.scrollHeight;
                        currentCharIndex++;
                        setTimeout(typeWelcome, 10);
                    } else {
                        currentLineIndex++;
                        currentCharIndex = 0;
                        setTimeout(typeWelcome, 300);
                    }
                } else {
                    // Welcome animation complete
                    welcomeSection.innerHTML = welcomeMessages.join('\n');
                    output.scrollTop = output.scrollHeight;
                }
            }

            // Start typing animation
            typeWelcome();
        });
    </script>
    <script src="js/terminal.js"></script>
</body>
</html>
