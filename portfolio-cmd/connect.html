<style>

:root{
--bg:#f3f4f6;
--card-bg:#ffffff;
--border:rgba(0,0,0,0.1);
--border-active:rgba(0,0,0,0.3);
--accent:#10b981;
--text:#1f2937;
--text-dim:#6b7280;
--red:#b83c28;
--angle:0deg;
}

body{
font-family:'JetBrains Mono', monospace;
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
position:relative;
}

/* CRT Scanlines */
body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,0,0,0.08),
rgba(0,0,0,0.08) 1px,
transparent 1px,
transparent 2px
);
pointer-events:none;
z-index:999;
}

/* Noise texture */
body::after{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url('data:image/svg+xml,%3Csvg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2"/%3E%3C/filter%3E%3Crect width="400" height="400" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
pointer-events:none;
z-index:998;
}



@keyframes glitch{
0%{transform:translateX(0);}
25%{transform:translateX(-2px);}
50%{transform:translateX(2px);}
75%{transform:translateX(-1px);}
100%{transform:translateX(0);}
}

@keyframes glitch2{
0%{transform:translateX(0);}
25%{transform:translateX(2px);}
50%{transform:translateX(-2px);}
75%{transform:translateX(1px);}
100%{transform:translateX(0);}
}



/* Connection Card Styles */
.connect-card{
background:var(--card-bg);
border:2px solid var(--border);
border-radius:12px;
padding:32px 24px;
margin:20px auto;
max-width:400px;
position:relative;
overflow:hidden;
transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.connect-card::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg, transparent, rgba(184,60,40,0.1), transparent);
transition:left 0.5s ease;
pointer-events:none;
}

.connect-card:hover{
transform:translateY(-8px);
border-color:var(--red);
box-shadow:0 12px 24px rgba(184,60,40,0.15), 0 0 1px rgba(184,60,40,0.5);
}

.connect-card:hover::before{
left:100%;
}

/* Section Container */
.section-container{
margin:40px 0;
}

.section-title{
font-size:16px;
font-weight:600;
color:var(--red);
margin-bottom:24px;
text-transform:uppercase;
letter-spacing:2px;
position:relative;
display:inline-block;
width:100%;
text-align:center;
}

.section-title::after{
content:'';
position:absolute;
bottom:-8px;
left:50%;
transform:translateX(-50%);
width:40px;
height:2px;
background:linear-gradient(90deg, transparent, var(--red), transparent);
}

/* Email Box */
.email-box{
background:var(--card-bg);
border:2px solid var(--border);
border-radius:12px;
padding:28px;
text-align:center;
transition:all 0.4s ease;
position:relative;
overflow:hidden;
}

.email-box::after{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:radial-gradient(circle at center, rgba(184,60,40,0.05) 0%, transparent 70%);
pointer-events:none;
}

.email-box:hover{
border-color:var(--red);
box-shadow:0 8px 20px rgba(184,60,40,0.12), inset 0 0 1px rgba(184,60,40,0.1);
transform:scale(1.02);
}

.email-label{
font-size:13px;
font-weight:600;
color:var(--text-dim);
letter-spacing:1px;
margin-bottom:12px;
text-transform:uppercase;
display:block;
}

.email-address{
font-size:16px;
font-weight:600;
color:var(--red);
text-decoration:none;
transition:all 0.3s ease;
position:relative;
display:inline-block;
}

.email-address::after{
content:'';
position:absolute;
bottom:-4px;
left:0;
right:0;
height:2px;
background:var(--red);
transform:scaleX(0);
transform-origin:right;
transition:transform 0.3s ease;
}

.email-box:hover .email-address::after{
transform:scaleX(1);
transform-origin:left;
}

/* Social Icons Container */
.social-container{
background:var(--card-bg);
border:2px solid var(--border);
border-radius:12px;
padding:32px;
margin:20px auto;
max-width:400px;
transition:all 0.4s ease;
}

.social-container:hover{
border-color:var(--red);
box-shadow:0 12px 24px rgba(184,60,40,0.15);
}

.social-icons-wrapper{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.social-icon-link{
width:56px;
height:56px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:2px solid var(--border);
color:var(--text);
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position:relative;
overflow:hidden;
background:var(--card-bg);
}

.social-icon-link::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(135deg, rgba(184,60,40,0.1), transparent);
opacity:0;
transition:opacity 0.3s ease;
}

.social-icon-link:hover{
transform:translateY(-6px) scale(1.1);
border-color:var(--red);
color:var(--red);
box-shadow:0 8px 16px rgba(184,60,40,0.2);
}

.social-icon-link:hover::before{
opacity:1;
}

.social-icon-link svg{
transition:transform 0.3s ease;
}

.social-icon-link:hover svg{
transform:rotate(15deg) scale(1.2);
}

/* CV Button Container */
.cv-box{
background:var(--card-bg);
border:2px solid var(--border);
border-radius:12px;
padding:32px 24px;
text-align:center;
margin:20px auto;
max-width:400px;
transition:all 0.4s ease;
position:relative;
}

.cv-box:hover{
border-color:var(--red);
box-shadow:0 12px 24px rgba(184,60,40,0.15);
}

.cv-label{
font-size:13px;
font-weight:600;
color:var(--text-dim);
letter-spacing:1px;
margin-bottom:16px;
text-transform:uppercase;
display:block;
}

.cv-button{
display:inline-block;
padding:14px 28px;
font-size:15px;
font-weight:700;
font-family:'JetBrains Mono', monospace;
color:white;
background:var(--red);
border:2px solid var(--red);
border-radius:8px;
text-decoration:none;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position:relative;
overflow:hidden;
letter-spacing:1px;
cursor:pointer;
}

.cv-button::before{
content:'';
position:absolute;
top:50%;
left:50%;
width:0;
height:0;
background:rgba(255,255,255,0.2);
border-radius:50%;
transform:translate(-50%, -50%);
transition:width 0.6s, height 0.6s;
}

.cv-button:hover::before{
width:300px;
height:300px;
}

.cv-button:hover{
transform:translateY(-4px);
box-shadow:0 8px 16px rgba(184,60,40,0.3);
letter-spacing:1.5px;
}

.cv-button:active{
transform:translateY(-2px);
box-shadow:0 4px 8px rgba(184,60,40,0.2);
}

/* Dark mode */
.dark{
--bg:#111827;
--card-bg:#1f2937;
--text:#e5e7eb;
--text-dim:#9ca3af;
--border:rgba(255,255,255,0.08);
--border-active:rgba(255,255,255,0.25);
--accent:#34d399;
--red:#e05535;
}

</style>


</head>
