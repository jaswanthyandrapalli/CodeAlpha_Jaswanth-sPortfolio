<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Jaswanth's | Skills</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:         #f3f4f6;
  --card-bg:    #ffffff;
  --topbar-bg:  #e9eaec;
  --border:     rgba(0,0,0,0.1);
  --accent:     #10b981;
  --blue:       #3b82f6;
  --text:       #1f2937;
  --text-dim:   #6b7280;
  --red:        #ef4444;
  --fs-base:    clamp(12px, 1.8vw, 14px);
  --pad:        clamp(16px, 4vw, 40px);
  --gap:        clamp(10px, 2vw, 18px);
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: clamp(12px, 4vw, 40px) clamp(10px, 3vw, 24px);
  padding-top: clamp(52px, 8vw, 72px); /* space for fixed ctrl */
  overflow-x: hidden;
  position: relative;
  transition: background 0.3s, color 0.3s;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.05) 1px,
    transparent 1px,
    transparent 2px
  );
  pointer-events: none;
  z-index: 999;
}

/* Noise */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2"/%3E%3C/filter%3E%3Crect width="400" height="400" filter="url(%23n)" opacity="0.04"/%3E%3C/svg%3E');
  pointer-events: none;
  z-index: 998;
}

/* ── Dark Mode ── */
body.dark {
  --bg:        #111827;
  --card-bg:   #1f2937;
  --topbar-bg: #0f172a;
  --border:    rgba(255,255,255,0.08);
  --text:      #e5e7eb;
  --text-dim:  #9ca3af;
  --accent:    #34d399;
}

/* ── Progress bar ── */
.page-progress {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--blue));
  z-index: 1000;
  transition: width 0.4s ease;
}

/* ── Controls ── */
.ui-controls {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: clamp(10px, 2vw, 16px) clamp(14px, 4vw, 28px);
  pointer-events: none;
}

.ctrl-btn {
  pointer-events: all;
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  font-size: 18px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.ctrl-btn:hover { transform: scale(1.1); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

/* ── Terminal wrapper ── */
.terminal {
  width: 100%;
  max-width: 900px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 0 0 1px var(--border);
  position: relative;
  z-index: 1;
  transition: box-shadow 0.3s, border-color 0.3s;
}

.terminal:hover {
  box-shadow: 0 12px 48px rgba(59,130,246,0.12), 0 0 0 1.5px var(--blue);
}

/* ── Topbar ── */
.topbar {
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(8px, 1.5vw, 12px) clamp(14px, 3vw, 22px);
}

.topbar-dots { display: flex; gap: 7px; align-items: center; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-red   { background: #ef4444; }
.dot-amber { background: #f59e0b; }
.dot-green { background: #22c55e; }

.topbar-title {
  font-size: clamp(13px, 2vw, 16px);
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text);
}

.topbar-right {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* ── Body ── */
.terminal-body {
  background: var(--card-bg);
  padding: var(--pad);
  display: flex;
  flex-direction: column;
  gap: clamp(18px, 3vw, 28px);
}

/* ── Terminal log lines ── */
.log {
  font-size: var(--fs-base);
  color: var(--accent);
  letter-spacing: 0.04em;
}

.log-dim { color: var(--text-dim); }

/* ── Skills section ── */
.skills-list {
  display: flex;
  flex-direction: column;
  gap: clamp(12px, 2vw, 18px);
}

.skill-row {
  opacity: 0;
  transform: translateX(-16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.skill-row.visible {
  opacity: 1;
  transform: translateX(0);
}

.skill-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
  gap: 8px;
  flex-wrap: nowrap;
}

.skill-name {
  font-size: clamp(11px, 1.8vw, 13px);
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.04em;
  transition: color 0.2s, transform 0.2s;
  cursor: default;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.skill-name:hover {
  color: var(--accent);
  transform: translateX(4px);
}

.skill-pct {
  font-size: clamp(10px, 1.6vw, 12px);
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}

/* Track */
.skill-track {
  width: 100%;
  height: clamp(6px, 1vw, 8px);
  background: rgba(0,0,0,0.08);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}

body.dark .skill-track { background: rgba(255,255,255,0.08); }

/* Fill */
.skill-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #38bdf8, #3b82f6, #6366f1);
  width: 0;
  transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

/* Shimmer on fill */
.skill-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
  animation: shimmer 2.2s infinite;
}

@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ── Tools grid ── */
.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(90px, 20vw, 130px), 1fr));
  gap: var(--gap);
}

/* Tool card */
.tool-card {
  position: relative;
  background: #161a21;
  color: #e5e7eb;
  border-radius: 10px;
  border: 2px solid rgba(59,130,246,0.25);
  padding: clamp(10px, 2.5vw, 16px) clamp(8px, 2vw, 12px);
  text-align: center;
  font-size: clamp(11px, 1.8vw, 13px);
  font-weight: 600;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1),
              box-shadow 0.3s ease,
              border-color 0.3s;
  cursor: default;
  letter-spacing: 0.04em;
}

/* Spinning border */
.tool-card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 11px;
  background: conic-gradient(
    from var(--angle),
    transparent 0deg,
    var(--blue) 40deg,
    rgba(99,102,241,0.8) 60deg,
    transparent 80deg
  );
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 0;
}

/* Inner mask */
.tool-card::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 8px;
  background: #161a21;
  z-index: 1;
}

.tool-label {
  position: relative;
  z-index: 2;
}

.tool-card.active::before,
.tool-card:hover::before {
  opacity: 1;
  animation: spin 2s linear infinite;
}

.tool-card:hover {
  transform: translateY(-8px) scale(1.06);
  box-shadow: 0 16px 32px rgba(59,130,246,0.2), 0 0 20px rgba(59,130,246,0.2);
  border-color: transparent;
}

.tool-card.revealed {
  opacity: 1;
  transform: translateY(0);
  animation: fadeInUp 0.5s ease-out both;
}

/* ── System ready line ── */
.ready-line {
  font-size: clamp(11px, 1.8vw, 13px);
  color: var(--accent);
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.ready-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

/* ── Exit button ── */
.exit-btn {
  position: fixed;
  bottom: clamp(16px, 4vw, 32px);
  right: clamp(14px, 4vw, 32px);
  background: #f59e0b;
  color: #1f2937;
  padding: 10px 18px;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 700;
  text-decoration: none;
  z-index: 50;
  transition: transform 0.2s, background 0.2s;
  border: 1.5px solid rgba(0,0,0,0.1);
  letter-spacing: 0.04em;
}
.exit-btn:hover { transform: scale(1.08); background: #fde68a; }

/* ── Animations ── */
@keyframes spin {
  from { --angle: 0deg; }
  to   { --angle: 360deg; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.85); }
}

/* ── Touch devices ── */
@media (hover: none) {
  .tool-card:hover { transform: none; box-shadow: none; border-color: rgba(59,130,246,0.25); }
  .tool-card:active { transform: scale(0.95); border-color: var(--blue); }
  .skill-name:hover { transform: none; }
}

/* ── Very small phones (≤368px): centre terminal vertically ── */
@media (max-width: 368px) {
  body {
    justify-content: center;
    min-height: 100dvh;
    padding-top: 52px;
    padding-bottom: 72px;
    align-items: center;
  }

  .terminal {
    width: 100%;
  }

  .tools-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

<body>

<!-- Progress bar -->
<div class="page-progress" id="pageProgress"></div>

<!-- Controls -->
<div class="ui-controls">
  <button class="ctrl-btn" onclick="toggleDark()" id="darkBtn" title="Toggle dark mode">🌙</button>
</div>

<!-- Terminal card -->
<div class="terminal">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-amber"></div>
      <div class="dot dot-green"></div>
    </div>
    <span class="topbar-title">기술</span>
    <span class="topbar-right">~/skills.sh</span>
  </div>

  <!-- Body -->
  <div class="terminal-body">

    <div>
      <p class="log">{skills.sh}</p>
      <p class="log log-dim" style="margin-top:6px;">../loading developer skills...</p>
    </div>

    <!-- Skills -->
    <div class="skills-list" id="skillsList">

      <div class="skill-row" data-pct="95">
        <div class="skill-header">
          <span class="skill-name">$HTML5</span>
          <span class="skill-pct">95%</span>
        </div>
        <div class="skill-track"><div class="skill-fill" data-width="95%"></div></div>
      </div>

      <div class="skill-row" data-pct="90">
        <div class="skill-header">
          <span class="skill-name">$CSS3 / SCSS</span>
          <span class="skill-pct">90%</span>
        </div>
        <div class="skill-track"><div class="skill-fill" data-width="90%"></div></div>
      </div>

      <div class="skill-row" data-pct="85">
        <div class="skill-header">
          <span class="skill-name">$JavaScript (ES6+)</span>
          <span class="skill-pct">85%</span>
        </div>
        <div class="skill-track"><div class="skill-fill" data-width="85%"></div></div>
      </div>

      <div class="skill-row" data-pct="90">
        <div class="skill-header">
          <span class="skill-name">$Tailwind CSS</span>
          <span class="skill-pct">90%</span>
        </div>
        <div class="skill-track"><div class="skill-fill" data-width="90%"></div></div>
      </div>

      <div class="skill-row" data-pct="85">
        <div class="skill-header">
          <span class="skill-name">$React.js</span>
          <span class="skill-pct">85%</span>
        </div>
        <div class="skill-track"><div class="skill-fill" data-width="85%"></div></div>
      </div>

      <div class="skill-row" data-pct="95">
        <div class="skill-header">
          <span class="skill-name">$Python</span>
          <span class="skill-pct">95%</span>
        </div>
        <div class="skill-track"><div class="skill-fill" data-width="95%"></div></div>
      </div>

    </div>

    <p class="log">../skills loaded successfully ✔</p>

    <!-- Tools -->
    <div>
      <p class="log" style="margin-bottom:var(--gap);">../tools --list</p>
      <div class="tools-grid" id="toolsGrid">
        <div class="tool-card" data-index="0"><span class="tool-label">Git</span></div>
        <div class="tool-card" data-index="1"><span class="tool-label">GitHub</span></div>
        <div class="tool-card" data-index="2"><span class="tool-label">VS Code</span></div>
        <div class="tool-card" data-index="3"><span class="tool-label">Vercel</span></div>
        <div class="tool-card" data-index="4"><span class="tool-label">Firebase</span></div>
        <div class="tool-card" data-index="5"><span class="tool-label">REST API</span></div>
      </div>
    </div>

    <!-- Ready -->
    <div class="ready-line">
      <div class="ready-dot"></div>
      <span>➜ ~ System ready.</span>
    </div>

  </div>
</div>

<!-- Exit -->
<a href="../index.html" class="exit-btn">&gt;&gt;&gt;</a>

<script>
/* ── Dark Mode ── */
function toggleDark() {
  const dark = document.body.classList.toggle('dark');
  document.getElementById('darkBtn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
  document.getElementById('darkBtn').textContent = '☀️';
}

/* ── Scroll progress ── */
window.addEventListener('scroll', () => {
  const total = document.documentElement.scrollHeight - window.innerHeight;
  const pct = total > 0 ? (window.scrollY / total) * 100 : 100;
  document.getElementById('pageProgress').style.width = pct + '%';
}, { passive: true });
window.dispatchEvent(new Event('scroll'));

/* ── Skill bar + row reveal on scroll ── */
const skillRows = document.querySelectorAll('.skill-row');
const skillObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      const row = entry.target;
      setTimeout(() => {
        row.classList.add('visible');
        const fill = row.querySelector('.skill-fill');
        if (fill) fill.style.width = fill.dataset.width;
        skillObserver.unobserve(row);
      }, i * 100);
    }
  });
}, { threshold: 0.2 });

skillRows.forEach(r => skillObserver.observe(r));

/* ── Tool card reveal ── */
const toolCards = document.querySelectorAll('.tool-card');

const toolObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      const card = entry.target;
      const idx = parseInt(card.dataset.index, 10);
      setTimeout(() => {
        card.classList.add('revealed');
        toolObserver.unobserve(card);
      }, idx * 100);
    }
  });
}, { threshold: 0.1 });

toolCards.forEach(c => toolObserver.observe(c));

/* ── Auto-cycle active tool card ── */
let activeIdx = 0, cycleTimer, hovering = false;

function setActive(idx) {
  toolCards.forEach((c, i) => c.classList.toggle('active', i === idx));
  activeIdx = idx;
}

function startCycle() {
  cycleTimer = setInterval(() => {
    if (!hovering) setActive((activeIdx + 1) % toolCards.length);
  }, 1900);
}
function stopCycle() { clearInterval(cycleTimer); }

startCycle();

toolCards.forEach((card, idx) => {
  card.addEventListener('mouseenter', () => { hovering = true; stopCycle(); setActive(idx); });
  card.addEventListener('mouseleave', () => { hovering = false; activeIdx = idx; startCycle(); });
  card.addEventListener('touchstart', () => { stopCycle(); setActive(idx); }, { passive: true });
  card.addEventListener('touchend', () => { activeIdx = idx; startCycle(); }, { passive: true });
});
</script>

</body>
</html>
