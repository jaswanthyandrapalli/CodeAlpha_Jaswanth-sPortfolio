<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>⚡ Jaswanth's Home</title>

<link rel="icon" type="image/png" href="portfolio-cmd/icons8-circled-j-50.png">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  /* Prevent bounce / rubber-band on iOS */
  overscroll-behavior: none;
}

/* ── Root vars ── */
:root {
  --green:      #00ff00;
  --green-dim:  #00cc00;
  --green-dark: #006600;
  --green-mid:  #00aa00;
  --bg:         #000000;
  --fs:         clamp(12px, 2vw, 16px);     /* fluid base font size  */
  --pad:        clamp(10px, 3vw, 20px);     /* fluid padding         */
  --lh:         1.5;
}

/* ── Full-screen terminal shell ── */
.terminal-body {
  background: var(--bg);
  color: var(--green);
  font-family: 'JetBrains Mono', monospace;
  height: 100dvh;           /* dynamic viewport height — handles mobile browser chrome */
  width: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Container ── */
#terminal-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: var(--pad);
  min-height: 0;            /* allow flex child to shrink below content size */
  position: relative;
}

/* CRT scanlines overlay */
#terminal-container::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.06),
    rgba(0,0,0,0.06) 1px,
    transparent 1px,
    transparent 2px
  );
  pointer-events: none;
  z-index: 10;
}

/* Subtle vignette */
#terminal-container::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 9;
}

/* ── Output area ── */
#output {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  white-space: pre-wrap;
  word-break: break-word;   /* prevent horizontal scroll on mobile */
  line-height: var(--lh);
  font-size: var(--fs);
  padding-bottom: 8px;
  /* smooth momentum scroll on iOS */
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ── Welcome block ── */
#welcome-section {
  color: var(--green);
  text-shadow: 0 0 8px rgba(0,255,0,0.5);
  margin-bottom: 16px;
  line-height: 1.6;
  /* Wrap long ASCII art on tiny screens without breaking character sequences */
  overflow-wrap: break-word;
}

/* ── Input row ── */
#input-container {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--green-dark);
  /* Stick to bottom even when virtual keyboard pushes viewport */
  flex-shrink: 0;
  position: relative;
  z-index: 20;
}

.prompt {
  color: var(--green-mid);
  font-weight: 700;
  font-size: var(--fs);
  white-space: nowrap;
  flex-shrink: 0;
  /* Truncate very long prompts on tiny screens */
  max-width: 55%;
  overflow: hidden;
  text-overflow: ellipsis;
}

#cmd-input {
  background: transparent;
  border: none;
  color: var(--green);
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--fs);
  flex: 1;
  min-width: 0;             /* allow shrink */
  outline: none;
  caret-color: var(--green);
}

#cmd-input::placeholder { color: var(--green-dark); }

/* tap-target helper on mobile */
#cmd-input {
  padding: 6px 0;
  min-height: 36px;
}

/* ── Typing cursor ── */
.typing {
  display: inline;
  border-right: 2px solid var(--green);
  animation: blink 0.7s step-end infinite;
}

/* ── Mobile helper hint ── */
#mobile-hint {
  display: none;
  position: fixed;
  bottom: 60px;
  right: 14px;
  background: rgba(0,80,0,0.85);
  color: var(--green);
  font-size: 11px;
  padding: 6px 10px;
  border: 1px solid var(--green-dark);
  border-radius: 6px;
  z-index: 50;
  pointer-events: none;
  letter-spacing: 0.04em;
  animation: fadeHint 4s ease forwards;
}

@keyframes fadeHint {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Scrollbar styling ── */
#output::-webkit-scrollbar       { width: 6px; }
#output::-webkit-scrollbar-track { background: #000; }
#output::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }
#output::-webkit-scrollbar-thumb:hover { background: var(--green-mid); }

/* ── Keyframes ── */
@keyframes blink {
  0%, 100% { border-color: var(--green); }
  50%       { border-color: transparent; }
}

/* ── Responsive tweaks ── */

/* Phones — portrait */
@media (max-width: 480px) {
  :root {
    --fs:  13px;
    --pad: 10px;
    --lh:  1.45;
  }

  /* ASCII art box may be wider than screen — allow horizontal scroll only for welcome */
  #welcome-section {
    font-size: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Show mobile tap hint */
  #mobile-hint { display: block; }

  /* Wider tap target */
  #cmd-input { min-height: 40px; font-size: 14px; }
  .prompt    { font-size: 12px; max-width: 46%; }
}

/* Phones — landscape / small tablets */
@media (min-width: 481px) and (max-width: 768px) {
  :root {
    --fs:  14px;
    --pad: 14px;
    --lh:  1.5;
  }

  #welcome-section { font-size: 12px; }
}

/* Tablets landscape / small laptops */
@media (min-width: 769px) and (max-width: 1024px) {
  :root {
    --fs:  15px;
    --pad: 18px;
  }
}

/* Large desktop */
@media (min-width: 1440px) {
  :root {
    --fs:  17px;
    --pad: 28px;
  }
  #terminal-container { max-width: 1200px; margin: 0 auto; width: 100%; }
}

/* Touch devices — bigger tap targets, remove hover glow */
@media (hover: none) {
  #cmd-input { min-height: 44px; }
  #welcome-section { text-shadow: none; }
}
</style>
</head>

<body class="terminal-body">
<div id="terminal-container">
  <div id="output">
    <div id="welcome-section"></div>
  </div>
  <div id="input-container">
    <span id="prompt" class="prompt">portfolio@cmd ~$&nbsp;</span>
    <input id="cmd-input" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false" autofocus
           placeholder="type 'help'">
  </div>
</div>

<!-- Mobile tap-to-type hint -->
<div id="mobile-hint">Tap here to type a command ↓</div>

<script>
/* ── Welcome message ── */
window.skipDefaultWelcome = true;

/* Responsive ASCII box:
   On small screens we swap the wide box for a compact version */
function getWelcomeMessages() {
  const narrow = window.innerWidth < 480;

  if (narrow) {
    return [
      "┌─────────────────────────────┐",
      "│                             │",
      "│   🎉  WELCOME TO            │",
      "│       EL DORADO  🎉         │",
      "│                             │",
      "│   Jaswanth's HOME CMD       │",
      "│                             │",
      "└─────────────────────────────┘",
      "",
      "Type 'help' for commands.",
      ""
    ];
  }

  return [
    "╔════════════════════════════════════════════════════════════╗",
    "║                                                            ║",
    "║              🎉  WELCOME TO EL DORADO  🎉                 ║",
    "║                                                            ║",
    "║              Jaswanth's HOME CMD                          ║",
    "║                                                            ║",
    "╚════════════════════════════════════════════════════════════╝",
    "",
    "Type 'help' to see available commands...",
    "💡 Use Laptop/Desktop for the best experience.",
    ""
  ];
}

document.addEventListener('DOMContentLoaded', () => {
  const welcomeSection = document.getElementById('welcome-section');
  const output = document.getElementById('output');
  const cmdInput = document.getElementById('cmd-input');
  const messages = getWelcomeMessages();
  let lineIdx = 0, charIdx = 0;

  function typeWelcome() {
    if (lineIdx >= messages.length) {
      // Done — render plain, remove cursor span
      welcomeSection.innerHTML = messages.join('\n');
      output.scrollTop = output.scrollHeight;
      return;
    }

    const line = messages[lineIdx];

    if (charIdx <= line.length) {
      const done  = messages.slice(0, lineIdx).join('\n');
      const sep   = lineIdx > 0 ? '\n' : '';
      const typed = line.substring(0, charIdx);
      welcomeSection.innerHTML = done + sep +
        '<span class="typing">' + typed + '</span>';
      output.scrollTop = output.scrollHeight;
      charIdx++;
      setTimeout(typeWelcome, 8);
    } else {
      lineIdx++;
      charIdx = 0;
      setTimeout(typeWelcome, 200);
    }
  }

  typeWelcome();

  /* ── Mobile: tap anywhere in output to focus input ── */
  output.addEventListener('click', () => { cmdInput.focus(); });

  /* ── Keep input in view when virtual keyboard opens ── */
  if ('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', () => {
      const container = document.getElementById('terminal-container');
      const kbHeight = window.innerHeight - window.visualViewport.height;
      container.style.paddingBottom = kbHeight > 50
        ? (kbHeight + 8) + 'px'
        : 'var(--pad)';
    });
  }
});
</script>

<script src="portfolio-cmd/js/terminal.js"></script>
</body>
</html>
